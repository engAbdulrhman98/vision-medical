<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- Metallic Slate Gradient for Gear and V -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="50%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <!-- Medical Emerald/Teal Gradient for M and Ring -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0fa2a4" />
    </linearGradient>

    <!-- Drop Shadow Filter for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Icon Group -->
  <g transform="translate(10, 10)" filter="url(#softShadow)">
    <!-- Grey outer gear wheel -->
    <path d="M 50 12 A 38 38 0 0 1 76.8 23.2 L 80 18 L 88 23 L 84.8 28.2 A 38 38 0 0 1 92 50 L 98 50 L 98 60 L 92 60 A 38 38 0 0 1 84.8 81.8 L 88 87 L 80 92 L 76.8 86.8 A 38 38 0 0 1 50 98 L 50 104 L 40 104 L 40 98 A 38 38 0 0 1 13.2 86.8 L 10 92 L 2 87 L 5.2 81.8 A 38 38 0 0 1 -2 60 L -8 60 L -8 50 L -2 50 A 38 38 0 0 1 5.2 28.2 L 2 23 L 10 18 L 13.2 23.2 A 38 38 0 0 1 40 12 L 40 6 L 50 6 Z" 
          fill="none" stroke="url(#metalGrad)" stroke-width="6.5" stroke-linejoin="round" />
    <circle cx="45" cy="55" r="38" fill="none" stroke="url(#metalGrad)" stroke-width="6.5" />
    
    <!-- Inner Teal Circle border -->
    <circle cx="45" cy="55" r="28" fill="none" stroke="url(#tealGrad)" stroke-width="3" />
    
    <!-- Stylized Teal M (behind) -->
    <path d="M 23 76 L 23 48 L 33 48 L 45 66 L 57 48 L 67 48 L 67 76 L 59 76 L 59 58 L 45 78 L 31 58 L 31 76 Z" fill="url(#tealGrad)" />
    
    <!-- Stylized Grey V (overlaying) -->
    <path d="M 21 34 L 33 34 L 45 56 L 57 34 L 69 34 L 51 72 L 39 72 Z" fill="url(#metalGrad)" opacity="0.95" />
  </g>
  
  <!-- Text Group -->
  <g transform="translate(135, 25)">
    <!-- VISION MEDICAL -->
    <text x="0" y="38" font-family="'Tajawal', 'Outfit', sans-serif" font-weight="900" font-size="34" letter-spacing="0.5">
      <tspan fill="#475569">VISION </tspan>
      <tspan fill="url(#tealGrad)">MEDICAL</tspan>
    </text>
    <!-- For Medical Maintenance -->
    <text x="0" y="66" font-family="'Tajawal', 'Outfit', sans-serif" font-weight="700" font-size="15" fill="#64748b" letter-spacing="0.8">
      For Medical Maintenance
    </text>
  </g>
</svg>
