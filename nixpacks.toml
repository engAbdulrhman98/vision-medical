[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.bcmath",
    "php84Extensions.curl",
    "php84Extensions.exif",
    "php84Extensions.fileinfo",
    "php84Extensions.gd",
    "php84Extensions.mbstring",
    "php84Extensions.mysqlnd",
    "php84Extensions.opcache",
    "php84Extensions.openssl",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.tokenizer",
    "php84Extensions.xml",
    "php84Extensions.zip",
    "composer",
    "nodejs_22",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm install --ignore-scripts"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:clear",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force 2>/dev/null; php artisan storage:link 2>/dev/null || true; php -S 0.0.0.0:$PORT -t public"
