[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.bcmath",
    "php84Extensions.curl",
    "php84Extensions.exif",
    "php84Extensions.fileinfo",
    "php84Extensions.gd",
    "php84Extensions.mbstring",
    "php84Extensions.mysqlnd",
    "php84Extensions.opcache",
    "php84Extensions.openssl",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.tokenizer",
    "php84Extensions.xml",
    "php84Extensions.zip",
    "composer"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

# No build phase artisan commands — they run at start time with correct env vars

[start]
cmd = "php artisan migrate --force; php artisan storage:link 2>/dev/null; php -S 0.0.0.0:$PORT -t public public/router.php"
