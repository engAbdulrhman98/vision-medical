server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    root /app/public;
    index index.php;
    charset utf-8;

    # Serve static files directly with correct MIME types and caching
    location ~* \.(css|js|mjs|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|svg|webp|json|map|txt|xml)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Laravel routing - all other requests go through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    client_max_body_size 50M;
    server_tokens off;
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
}
